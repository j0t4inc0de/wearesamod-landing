<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <!-- Vibrant Gradient matching the brand colors -->
    <linearGradient id="neonGrad" x1="1" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#10B981" />
      <stop offset="50%" stop-color="#3B82F6" />
      <stop offset="100%" stop-color="#8B5CF6" />
    </linearGradient>
  </defs>

  <!-- Dark rounded rectangle base for maximum contrast and visibility in any tab -->
  <rect width="512" height="512" rx="120" fill="#05070C" />

  <!-- A VERY thick, bold 'S' Path for high legibility at tiny sizes -->
  <path d="M 368 104
           L 256 104
           A 76 76 0 0 0 256 256
           A 76 76 0 0 1 256 408
           L 144 408" 
        stroke="url(#neonGrad)" stroke-width="64" stroke-linecap="round" fill="none" />

  <!-- Giant Nodes with a cutout effect so it looks like a circuit/n8n flow -->
  <circle cx="368" cy="104" r="48" fill="#10B981" stroke="#05070C" stroke-width="16" />
  <circle cx="256" cy="256" r="48" fill="#3B82F6" stroke="#05070C" stroke-width="16" />
  <circle cx="144" cy="408" r="48" fill="#8B5CF6" stroke="#05070C" stroke-width="16" />
</svg>